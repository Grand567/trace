<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="100%" height="100%">
  <!-- Background -->
  <rect width="1024" height="1024" fill="#ffecdb" />
  
  <defs>
    <!-- Left Tower definition -->
    <g id="left-tower">
      <!-- Bottom foundation slab -->
      <rect x="100" y="815" width="260" height="15" rx="4" fill="#fff8f0" stroke="#5c1e0e" stroke-width="4" />
      
      <!-- Brick base block -->
      <rect x="120" y="615" width="230" height="200" fill="#b34f2a" stroke="#5c1e0e" stroke-width="4" />
      
      <!-- Brick textures -->
      <rect x="140" y="635" width="60" height="25" rx="3" fill="#8c351b" stroke="#5c1e0e" stroke-width="3" />
      <rect x="250" y="635" width="60" height="25" rx="3" fill="#8c351b" stroke="#5c1e0e" stroke-width="3" />
      <rect x="190" y="690" width="60" height="25" rx="3" fill="#8c351b" stroke="#5c1e0e" stroke-width="3" />
      <rect x="275" y="690" width="55" height="25" rx="3" fill="#8c351b" stroke="#5c1e0e" stroke-width="3" />
      <rect x="140" y="745" width="60" height="25" rx="3" fill="#8c351b" stroke="#5c1e0e" stroke-width="3" />
      <rect x="250" y="745" width="60" height="25" rx="3" fill="#8c351b" stroke="#5c1e0e" stroke-width="3" />
      
      <!-- Middle divider slab -->
      <rect x="100" y="600" width="260" height="15" rx="4" fill="#fff8f0" stroke="#5c1e0e" stroke-width="4" />
      
      <!-- Roof Tiers -->
      <!-- Tier 0 -->
      <rect x="68" y="590" width="304" height="10" rx="3" fill="#fff8f0" stroke="#5c1e0e" stroke-width="3" />
      <path d="M 80,590 L 356,590 L 356,557 L 96,557 Z" fill="#b34f2a" stroke="#5c1e0e" stroke-width="3" />
      
      <!-- Tier 1 -->
      <rect x="95" y="547" width="277" height="10" rx="3" fill="#fff8f0" stroke="#5c1e0e" stroke-width="3" />
      <path d="M 107,547 L 356,547 L 356,514 L 123,514 Z" fill="#b34f2a" stroke="#5c1e0e" stroke-width="3" />
      
      <!-- Tier 2 -->
      <rect x="122" y="504" width="250" height="10" rx="3" fill="#fff8f0" stroke="#5c1e0e" stroke-width="3" />
      <path d="M 134,504 L 356,504 L 356,471 L 150,471 Z" fill="#b34f2a" stroke="#5c1e0e" stroke-width="3" />
      
      <!-- Tier 3 -->
      <rect x="149" y="461" width="223" height="10" rx="3" fill="#fff8f0" stroke="#5c1e0e" stroke-width="3" />
      <path d="M 161,461 L 356,461 L 356,428 L 177,428 Z" fill="#b34f2a" stroke="#5c1e0e" stroke-width="3" />
      
      <!-- Tier 4 -->
      <rect x="176" y="418" width="196" height="10" rx="3" fill="#fff8f0" stroke="#5c1e0e" stroke-width="3" />
      <path d="M 188,418 L 356,418 L 356,385 L 204,385 Z" fill="#b34f2a" stroke="#5c1e0e" stroke-width="3" />
      
      <!-- Tier 5 -->
      <rect x="203" y="375" width="169" height="10" rx="3" fill="#fff8f0" stroke="#5c1e0e" stroke-width="3" />
      <path d="M 215,375 L 356,375 L 356,342 L 231,342 Z" fill="#b34f2a" stroke="#5c1e0e" stroke-width="3" />
      
      <!-- Tier 6 -->
      <rect x="230" y="332" width="142" height="10" rx="3" fill="#fff8f0" stroke="#5c1e0e" stroke-width="3" />
      <path d="M 242,332 L 356,332 L 356,299 L 258,299 Z" fill="#b34f2a" stroke="#5c1e0e" stroke-width="3" />
      
      <!-- Tier 7 -->
      <rect x="257" y="289" width="115" height="10" rx="3" fill="#fff8f0" stroke="#5c1e0e" stroke-width="3" />
      <path d="M 269,289 L 356,289 L 356,256 L 285,256 Z" fill="#b34f2a" stroke="#5c1e0e" stroke-width="3" />
      
      <!-- Tier 8 -->
      <rect x="284" y="246" width="88" height="10" rx="3" fill="#fff8f0" stroke="#5c1e0e" stroke-width="3" />
      <path d="M 296,246 L 356,246 L 356,213 L 312,213 Z" fill="#b34f2a" stroke="#5c1e0e" stroke-width="3" />
      
      <!-- Tier 9 -->
      <rect x="311" y="203" width="61" height="10" rx="3" fill="#fff8f0" stroke="#5c1e0e" stroke-width="3" />
      <path d="M 323,203 L 356,203 L 356,170 L 339,170 Z" fill="#b34f2a" stroke="#5c1e0e" stroke-width="3" />
      
      <!-- Tier 10 (top cap) -->
      <rect x="330" y="160" width="42" height="10" rx="2" fill="#fff8f0" stroke="#5c1e0e" stroke-width="3" />
      <path d="M 338,160 L 356,160 L 356,130 L 348,130 Z" fill="#b34f2a" stroke="#5c1e0e" stroke-width="3" />
    </g>
  </defs>

  <!-- Left Pagoda Tower -->
  <use href="#left-tower" />

  <!-- Right Pagoda Tower (Mirrored) -->
  <use href="#left-tower" transform="translate(1024, 0) scale(-1, 1)" />

  <!-- Shadows under the center pin -->
  <ellipse cx="512" cy="670" rx="35" ry="6" fill="#2d2d2d" stroke="#1d1d1d" stroke-width="2" />
  <rect x="370" y="695" width="284" height="17" rx="8" fill="#2d2d2d" stroke="#1d1d1d" stroke-width="3" />
  <rect x="370" y="730" width="284" height="28" rx="14" fill="#2d2d2d" stroke="#1d1d1d" stroke-width="3" />

  <!-- Center Map Pin -->
  <path d="M 370,230 Q 512,110 654,230 L 654,520 L 512,655 L 370,520 Z" fill="#b53534" stroke="#5c1e0e" stroke-width="6" stroke-linejoin="round" />

  <!-- Cream circle inside pin -->
  <circle cx="512" cy="310" r="95" fill="#ffecdb" stroke="#5c1e0e" stroke-width="5" />

  <!-- Open Book inside circle -->
  <!-- Book Cover / Base -->
  <path d="M 450,335 C 470,340 495,343 512,345 C 529,343 554,340 574,335 L 574,285 C 554,290 529,293 512,295 C 495,293 470,290 450,285 Z" fill="#b34f2a" stroke="#5c1e0e" stroke-width="4" stroke-linejoin="round" />
  <!-- Book Pages Thickness -->
  <path d="M 454,330 C 472,335 496,338 512,340 M 512,340 C 528,338 552,335 570,330" fill="none" stroke="#5c1e0e" stroke-width="3" />
  <path d="M 458,325 C 474,330 498,333 512,335 M 512,335 C 526,333 550,330 566,325" fill="none" stroke="#5c1e0e" stroke-width="3" />
  <!-- Top Page (Left) -->
  <path d="M 512,290 C 495,288 470,284 452,278 C 450,278 448,322 458,322 C 475,325 498,328 512,330 Z" fill="#fffcf0" stroke="#5c1e0e" stroke-width="4" stroke-linejoin="round" />
  <!-- Top Page (Right) -->
  <path d="M 512,290 C 529,288 554,284 572,278 C 574,278 576,322 566,322 C 549,325 526,328 512,330 Z" fill="#fffcf0" stroke="#5c1e0e" stroke-width="4" stroke-linejoin="round" />
  <!-- Text Lines on Pages -->
  <path d="M 465,295 Q 480,297 495,298 M 463,304 Q 480,306 495,307 M 461,313 Q 480,315 495,316" fill="none" stroke="#8c351b" stroke-width="2" stroke-linecap="round" />
  <path d="M 559,295 Q 544,297 529,298 M 561,304 Q 544,306 529,307 M 563,313 Q 544,315 529,316" fill="none" stroke="#8c351b" stroke-width="2" stroke-linecap="round" />
  <!-- Spine / center ribbon -->
  <path d="M 512,290 L 512,338" fill="none" stroke="#5c1e0e" stroke-width="4" stroke-linecap="round" />
</svg>
